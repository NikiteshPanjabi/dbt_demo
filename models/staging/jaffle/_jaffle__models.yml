models:
  - name: stg_jaffle_shop__orders
    description: Order Details
    columns:
      - name: id
        data_type: int64
        tests:
          - unique
      - name: user_id
        data_type: int64
      - name: order_date
        data_type: date
      - name: status
        data_type: string
      - name: _etl_loaded_at
        data_type: datetime
        quote: true
  - name: stg_jaffle_shop__customers
    description: Customer Details
    columns:
      - name: id
        data_type: int64
      - name: first_name
        data_type: string
      - name: last_name
        data_type: string
